<div class="container mt-5" style="max-width: 650px;">
    <h1 class="mb-3 text-center">List Your Business</h1>
    <p class="text-muted mb-4 text-center">
        Fill in your details and get discovered by students on campus.
    </p>

    <form method="POST" action="{{ url_for('list_business') }}" enctype="multipart/form-data">

        <!-- Business Name -->
        <div class="mb-3">
            <label class="form-label fw-semibold">Business Name *</label>
            <input type="text" class="form-control" name="business_name"
                   placeholder="e.g. Cecilia's Skincare" required>
        </div>

        <!-- Your Name -->
        <div class="mb-3">
            <label class="form-label fw-semibold">Your Name *</label>
            <input type="text" class="form-control" name="your_name"
                   placeholder="e.g. Cecilia Mensah" required>
        </div>

        <!-- Category -->
        <div class="mb-3">
            <label class="form-label fw-semibold">Category *</label>
            <select class="form-select" name="category" required>
                <option value="">-- Select a category --</option>
                <option value="food">Food & Drinks</option>
                <option value="skincare">Skincare & Beauty</option>
                <option value="fashion">Fashion & Accessories</option>
                <option value="tech">Tech & Electronics</option>
                <option value="tutoring">Tutoring Services</option>
                <option value="other">Other</option>
            </select>
        </div>

        <!-- Description (smaller + longer feel) -->
        <div class="mb-3">
            <label class="form-label fw-semibold">Business Description *</label>
            <textarea class="form-control"
                      name="description"
                      rows="2"
                      style="height: 60px; resize: none;"
                      minlength="20"
                      required
                      onkeyup="updateCharCount()"></textarea>

            <small class="text-muted">
                <span id="charCount">0</span> characters (min. 20)
            </small>
        </div>

        <!-- WhatsApp -->
        <div class="mb-3">
            <label class="form-label fw-semibold">WhatsApp Number *</label>
            <input type="tel" class="form-control" name="whatsapp"
                   placeholder="e.g. 0241234567" required>
        </div>

        <!-- Phone -->
        <div class="mb-3">
            <label class="form-label fw-semibold">Phone Number *</label>
            <input type="tel" class="form-control" name="phone"
                   placeholder="e.g. 0201234567" required>
        </div>

        <!-- Location -->
        <div class="mb-3">
            <label class="form-label fw-semibold">Location on Campus *</label>
            <input type="text" class="form-control" name="location"
                   placeholder="e.g. Near Science Block" required>
        </div>

        <!-- Delivery -->
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" name="delivery" value="yes">
            <label class="form-check-label">I offer delivery</label>
        </div>

        <!-- Photo -->
        <div class="mb-4">
            <label class="form-label fw-semibold">Product Photo *</label>
            <input type="file" class="form-control" name="photo" accept="image/*" required>
        </div>

        <!-- Button -->
        <div class="text-center mt-5">
            <button type="submit" class="btn btn-primary btn-lg px-5">
                Submit My Business
            </button>
        </div>

    </form>
</div>
