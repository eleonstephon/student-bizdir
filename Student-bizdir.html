<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Your Business - Student BizDir</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .form-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 30px;
        }
        .form-container h2 {
            color: #333;
            margin-bottom: 10px;
        }
        .form-container p {
            color: #666;
            margin-bottom: 30px;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .form-label {
            font-weight: 600;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2>📢 Register Your Business</h2>
            <p>Reach more students on campus! Fill out the form below to list your business.</p>
            
            <form action="/register" method="POST">
                <div class="mb-3">
                    <label for="name" class="form-label">Business Name *</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                
                <div class="mb-3">
                    <label for="category" class="form-label">Category *</label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="">Select a category</option>
                        <option value="Beauty & Skincare">Beauty & Skincare</option>
                        <option value="Food & Drinks">Food & Drinks</option>
                        <option value="Tech & Services">Tech & Services</option>
                        <option value="Fashion & Clothing">Fashion & Clothing</option>
                        <option value="Lights & Decor">Lights & Decor</option>
                        <option value="Services">Services</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="description" class="form-label">Description *</label>
                    <textarea class="form-control" id="description" name="description" rows="4" required></textarea>
                    <small class="text-muted">Tell students what you offer, prices, location, etc.</small>
                </div>
                
                <div class="mb-3">
                    <label for="contact" class="form-label">WhatsApp/Phone Number *</label>
                    <input type="tel" class="form-control" id="contact" name="contact" placeholder="024XXXXXXX" required>
                </div>
                
                <div class="mb-3">
                    <label for="image" class="form-label">Image URL (optional)</label>
                    <input type="text" class="form-control" id="image" name="image" placeholder="https://example.com/image.jpg">
                </div>
                
                <button type="submit" class="btn btn-primary w-100 btn-submit">Submit Business →</button>
            </form>
            
            <div class="text-center mt-3">
                <a href="/" class="text-decoration-none">← Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
