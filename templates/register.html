{% extends "base.html" %}

{% block title %}List Your Business{% endblock %}

{% block main %}
<div class="row justify-content-center mt-5">
    <div class="col-md-7">
        <div class="text-center mb-4">
            <h2 class="fw-bold">📋 List Your Business</h2>
            <p class="text-muted">Fill in your details and get discovered by students on campus.</p>
        </div>

        <form id="registerForm" action="/register" method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label fw-bold">Business Name *</label>
                <input type="text" name="business_name" class="form-control" placeholder="e.g. Cecilia's Skincare" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Your Name *</label>
                <input type="text" name="owner_name" class="form-control" placeholder="e.g. Cecilia Mensah" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Category *</label>
                <select name="category" class="form-select" required>
                    <option value="">-- Select a category --</option>
                    <option value="Food & Drinks">Food & Drinks</option>
                    <option value="Beauty & Skincare">Beauty & Skincare</option>
                    <option value="Fashion & Clothing">Fashion & Clothing</option>
                    <option value="Tech & Services">Tech & Services</option>
                    <option value="Lights & Decor">Lights & Decor</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Business Description *</label>
                <textarea name="description" class="form-control" rows="4" placeholder="Tell customers what you sell..." required></textarea>
                <div class="form-text text-muted">Minimum 20 characters.</div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">WhatsApp Number</label>
                <input type="text" name="whatsapp" class="form-control" placeholder="e.g. 0241234567">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Phone Number</label>
                <input type="text" name="phone" class="form-control" placeholder="e.g. 0201234567">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Location on Campus</label>
                <input type="text" name="location" class="form-control" placeholder="e.g. Near Science Block">
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" name="delivers" class="form-check-input" id="delivers">
                <label class="form-check-label" for="delivers">I offer delivery</label>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Product Photo</label>
                <input type="file" name="photo" class="form-control" accept="image/*">
            </div>

            <button type="submit" class="btn btn-warning w-100 fw-bold py-2">🚀 Submit My Business</button>
        </form>
    </div>
</div>
{% endblock main %}
